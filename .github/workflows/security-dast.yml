name: Security DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to scan'
        required: false
        default: 'https://hexyr.com'
  schedule:
    - cron: '35 3 * * 1'

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: ZAP baseline scan
        id: zap
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ inputs.target_url || 'https://hexyr.com' }}
          allow_issue_writing: false
          cmd_options: '-a -j -m 5'

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: ignore
